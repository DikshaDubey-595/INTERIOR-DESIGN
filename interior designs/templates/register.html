<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<style>

body{
    margin:0;
    font-family:Arial;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at top left, #1a1a1a, #000);
    overflow:hidden;
}

/* glowing background */
body::before,
body::after{
    content:"";
    position:absolute;
    width:320px;
    height:320px;
    border-radius:50%;
    filter:blur(120px);
    z-index:-1;
}

body::before{
    background:#00c6ff;
    top:10%;
    left:10%;
}

body::after{
    background:#ff4d6d;
    bottom:10%;
    right:10%;
}

/* BOX */
.box{
    width:360px;
    padding:40px;

    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(15px);

    border-radius:20px;
    box-shadow:0 10px 40px rgba(0,0,0,0.6);

    text-align:center;

    animation:fadeIn 0.8s ease-in-out;
}

@keyframes fadeIn{
    from{transform:translateY(-20px); opacity:0;}
    to{transform:translateY(0); opacity:1;}
}

/* TITLE */
.box h2{
    color:white;
    margin-bottom:20px;
}

.box h2 span{
    color:#00c6ff;
}

/* INPUT */
input{
    width:100%;
    padding:14px;
    margin-bottom:15px;

    border:none;
    border-radius:10px;

    background:rgba(0,0,0,0.4);
    color:white;

    outline:none;
    transition:0.3s;
}

input:focus{
    border:1px solid #00c6ff;
    box-shadow:0 0 10px rgba(0,198,255,0.4);
}

/* BUTTON */
button{
    width:100%;
    padding:14px;

    border:none;
    border-radius:10px;

    background:linear-gradient(135deg,#00c6ff,#0072ff);
    color:white;

    font-weight:bold;
    cursor:pointer;

    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 10px 20px rgba(0,0,0,0.4);
}

/* LINK */
a{
    display:block;
    margin-top:15px;
    color:#00c6ff;
    text-decoration:none;
    font-size:14px;
}

a:hover{
    text-decoration:underline;
}

/* MESSAGE */
.msg{
    color:#00ff99;
    margin-bottom:10px;
    font-size:14px;
}

.error{
    color:#ff4d6d;
    margin-bottom:10px;
    font-size:14px;
}

</style>
</head>

<body>

<div class="box">

    <h2>User <span>Register</span></h2>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="msg">{{ messages[0] }}</div>
      {% endif %}
    {% endwith %}

    <form method="POST">

        <input type="text" name="username" placeholder="Username" required>

        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Create Account</button>

    </form>

    <a href="/userlogin">Already have account? Login</a>

</div>
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
