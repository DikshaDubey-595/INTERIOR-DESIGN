<!DOCTYPE html>
<html>
<head>
<title>Contact</title>

<style>

body{
    margin:0;
    font-family:Arial;
    color:white;
    min-height:100vh;

    /* CREATIVE BACKGROUND */
    background: radial-gradient(circle at top left, #1a1a1a, #000);
    overflow-x:hidden;
}

/* glowing effect circles */
body::before,
body::after{
    content:"";
    position:fixed;
    width:300px;
    height:300px;
    border-radius:50%;
    filter:blur(120px);
    z-index:-1;
}

body::before{
    background:#d9a066;
    top:10%;
    left:-50px;
}

body::after{
    background:#ff4d6d;
    bottom:10%;
    right:-80px;
}

/* TITLE */

.title{
    text-align:center;
    padding:70px 20px 10px;
}

.title h1{
    font-size:55px;
    margin:0;
    letter-spacing:2px;
}

.title span{
    color:#d9a066;
}

/* MAIN CONTAINER */

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:40px;
    padding:40px 10%;
    flex-wrap:wrap;
}

/* GLASS FORM */

.form-box{
    width:420px;
    padding:35px;

    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(15px);

    border-radius:20px;

    box-shadow:0 10px 40px rgba(0,0,0,0.5);

    transition:0.4s;
}

.form-box:hover{
    transform:translateY(-8px);
    border:1px solid #d9a066;
}

.form-box h2{
    margin-bottom:20px;
}

.form-box span{
    color:#d9a066;
}

/* INPUT */

input, textarea{
    width:100%;
    padding:14px;
    margin-bottom:12px;

    background:rgba(0,0,0,0.3);
    border:1px solid rgba(255,255,255,0.1);

    color:white;
    border-radius:10px;

    outline:none;
    transition:0.3s;
}

input:focus, textarea:focus{
    border:1px solid #d9a066;
    box-shadow:0 0 10px rgba(217,160,102,0.3);
}

/* BUTTON */

button{
    width:100%;
    padding:14px;
    border:none;

    background:linear-gradient(135deg,#d9a066,#ff7b54);

    font-size:16px;
    border-radius:10px;

    cursor:pointer;
    transition:0.3s;
    font-weight:bold;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 10px 20px rgba(0,0,0,0.4);
}

/* INFO BOX */

.info{
    width:320px;
}

.info-card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);

    padding:20px;
    margin-bottom:15px;

    border-radius:15px;
    transition:0.3s;

    backdrop-filter:blur(10px);
}

.info-card:hover{
    transform:translateX(8px);
    border:1px solid #d9a066;
}

.info-card h3{
    margin:0 0 5px;
    color:#d9a066;
}
/* ===== MAP ===== */

.map{
    margin-top:15px;
    border-radius:15px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,0.1);
}

.map iframe{
    width:100%;
    height:180px;
    border:0;
}
/* RESPONSIVE */

@media (max-width:900px){
    .container{
        flex-direction:column;
    }

    .form-box, .info{
        width:100%;
        max-width:500px;
    }

    .title h1{
        font-size:40px;
    }
}

</style>
</head>

<body>

<div class="title">
    <h1>Get In <span>Touch</span></h1>
</div>

<div class="container">

    <!-- FORM -->
    <div class="form-box">
<div class="map">
    <iframe
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3559.138!2d80.9462!3d26.8467!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x399bfd5f6b8b0b6b%3A0x2e1f0a3b5f0c9d!2sIndia!5e0!3m2!1sen!2sin!4v0000000000"
        allowfullscreen=""
        loading="lazy">
    </iframe>
</div>
        <h2>Send Message</h2>


<!-- SUCCESS MESSAGE -->
{% with messages = get_flashed_messages() %}
  {% if messages %}
    {% for msg in messages %}
      <p style="color:green;">{{ msg }}</p>
    {% endfor %}
  {% endif %}
{% endwith %}
<form action="/submit" method="POST">

    <input type="text" name="name" placeholder="Your Name" required>

    <input type="email" name="email" placeholder="Your Email" required>

    <input type="text" name="subject" placeholder="Subject">

    <textarea name="message" rows="5" placeholder="Your Message"></textarea>

    <button type="submit">Send Message</button>

</form>

    </div>

    <!-- INFO -->
    <div class="info">

        <div class="info-card">
            <h3>📞 Phone</h3>
            <p>+91 98765 43210</p>
        </div>

        <div class="info-card">
            <h3>📧 Email</h3>
            <p>info@yourwebsite.com</p>
        </div>

        <div class="info-card">
            <h3>📍 Location</h3>
            <p>India</p>
        </div>

        <div class="info-card">
            <h3>⏰ Working Hours</h3>
            <p>Mon - Sat : 9AM - 6PM</p>
        </div>

    </div>

</div>
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
