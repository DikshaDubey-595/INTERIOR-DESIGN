<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
/* ===== LOGIN PAGE ===== */

.login-page{

    min-height: 100vh;

    width: 100%;

    background:
    linear-gradient(rgba(0,0,0,0.65),
    rgba(0,0,0,0.65)),
    url("/static/img/img1.jpg");

    background-size: cover;

    background-position: center;

    display: flex;

    justify-content: center;

    align-items: center;

    padding: 40px;

    position: relative;

    overflow: hidden;
}

/* CONTAINER */

.login-container{

    width: 100%;

    max-width: 1150px;

    display: flex;

    align-items: center;

    justify-content: space-between;

    gap: 60px;

    position: relative;

    z-index: 2;
}

/* LEFT SIDE */

.login-left{

    flex: 1;
}

.login-left h1{

    color: white;

    font-size: 65px;

    margin-bottom: 25px;

    line-height: 1.2;

    font-family: "Playfair Display", serif;
}

.login-left p{

    color: rgba(255,255,255,0.85);

    font-size: 18px;

    line-height: 2;

    max-width: 520px;
}

/* LOGIN BOX */

.login-box{

    width: 430px;

    padding: 55px 40px;

    border-radius: 30px;

    background: rgba(255,255,255,0.08);

    backdrop-filter: blur(18px);

    border: 1px solid rgba(255,255,255,0.15);

    box-shadow:
    0 15px 45px rgba(0,0,0,0.25);
}

/* HEADING */

.login-box h2{

    color: white;

    text-align: center;

    margin-bottom: 40px;

    font-size: 42px;

    font-family: "Playfair Display", serif;
}

/* INPUT BOX */

.input-box{

    position: relative;

    margin-bottom: 32px;
}

.input-box input{

    width: 100%;

    padding: 18px 18px;

    background: rgba(255,255,255,0.08);

    border: 1px solid rgba(255,255,255,0.2);

    border-radius: 14px;

    outline: none;

    color: white;

    font-size: 16px;
}

/* LABEL */

.input-box label{

    position: absolute;

    top: 50%;

    left: 18px;

    transform: translateY(-50%);

    color: rgba(255,255,255,0.7);

    pointer-events: none;

    transition: 0.4s ease;
}

/* FLOAT LABEL */

.input-box input:focus + label,
.input-box input:valid + label{

    top: -10px;

    left: 14px;

    background: #181818;

    padding: 0 8px;

    font-size: 13px;

    color: #e5aa70;
}

/* FOCUS */

.input-box input:focus{

    border-color: #e5aa70;

    box-shadow:
    0 0 15px rgba(229,170,112,0.3);
}

/* BUTTON */

.login-btn{

    width: 100%;

    padding: 17px;

    border: none;

    border-radius: 50px;

    background: #e5aa70;

    color: black;

    font-size: 17px;

    font-weight: 600;

    cursor: pointer;

    transition: 0.5s ease;
}

/* HOVER */

.login-btn:hover{

    background: white;

    transform: translateY(-5px);
}

/* REGISTER */

.register-link{

    text-align: center;

    margin-top: 25px;

    color: rgba(255,255,255,0.75);
}

.register-link a{

    color: #e5aa70;

    text-decoration: none;

    font-weight: 600;
}

/* RESPONSIVE */

@media(max-width:991px){

    .login-container{

        flex-direction: column;

        text-align: center;
    }

    .login-left h1{

        font-size: 52px;
    }

    .login-left p{

        margin: auto;
    }

}

@media(max-width:768px){

    .login-page{

        padding: 20px;
    }

    .login-box{

        width: 100%;

        padding: 45px 28px;
    }

    .login-left h1{

        font-size: 40px;
    }

}

@media(max-width:480px){

    .login-left h1{

        font-size: 32px;
    }

    .login-left p{

        font-size: 15px;
    }

    .login-box h2{

        font-size: 32px;
    }

}
</style>
</head>

<body>

<section class="login-page">

    <div class="login-overlay"></div>

    <div class="login-container">

        <div class="login-left">

            <h1>Welcome Back</h1>

            <p>
                Transform your dream space with luxury interior designs,
                modern creativity, and elegant living solutions.
            </p>

        </div>

        <div class="login-box">

            <h2>Login</h2>

            <form method="POST">

                <div class="input-box">
                    <input type="text" name="username" required>
                    <label>UserName</label>
                </div>

                <div class="input-box">
                    <input type="password" name="password" required>
                    <label>Password</label>
                </div>

                <button type="submit" class="login-btn">
                    Login
                </button>

            </form>

            <p class="register-link">
                Don't have an account?
                <a href="/register">Register</a>
            </p>

        </div>

    </div>

</section>
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
