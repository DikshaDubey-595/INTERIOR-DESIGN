<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<style>

body{
    margin:0;
    font-family:Arial;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at top left, #1a1a1a, #000);
    overflow:hidden;
}

/* glowing background */
body::before,
body::after{
    content:"";
    position:absolute;
    width:300px;
    height:300px;
    border-radius:50%;
    filter:blur(120px);
    z-index:-1;
}

body::before{
    background:#d9a066;
    top:10%;
    left:10%;
}

body::after{
    background:#ff4d6d;
    bottom:10%;
    right:10%;
}

/* LOGIN BOX */

.box{
    width:320px;
    padding:40px;

    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(15px);

    border-radius:20px;

    box-shadow:0 10px 40px rgba(0,0,0,0.6);

    text-align:center;

    animation:fadeIn 0.8s ease-in-out;
}

@keyframes fadeIn{
    from{transform:translateY(-20px); opacity:0;}
    to{transform:translateY(0); opacity:1;}
}

/* TITLE */

.box h2{
    margin-bottom:20px;
    color:white;
}

.box h2 span{
    color:#d9a066;
}

/* INPUT */

input{
    width:100%;
    padding:14px;
    margin-bottom:15px;

    border:none;
    border-radius:10px;

    background:rgba(0,0,0,0.4);
    color:white;

    outline:none;
    transition:0.3s;
}

input:focus{
    border:1px solid #d9a066;
    box-shadow:0 0 10px rgba(217,160,102,0.4);
}

/* BUTTON */

button{
    width:100%;
    padding:14px;

    border:none;
    border-radius:10px;

    background:linear-gradient(135deg,#d9a066,#ff7b54);
    color:black;

    font-weight:bold;
    cursor:pointer;

    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 10px 20px rgba(0,0,0,0.4);
}

/* ERROR */

.error{
    color:#ff4d6d;
    margin-bottom:10px;
    font-size:14px;
}

</style>
</head>

<body>

<div class="box">

    <h2>Admin <span>Login</span></h2>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="error">{{ messages[0] }}</div>
      {% endif %}
    {% endwith %}

    <form method="POST">

        <input type="text" name="username" placeholder="Username" required>

        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>

    </form>

</div>
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
